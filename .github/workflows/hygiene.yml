name: Hygiene

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 10 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-docs:
    name: Python, docs, and formatting
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check text formatting
        run: python tools/check_text_format.py

      - name: Compile-check Python
        run: python -m compileall -q listen.py obs_rl_statsapi.py rl_statsapi_listener integrations tests tools

      - name: Validate documentation examples and links
        run: python tools/check_docs.py

      - name: Run Python tests
        run: python -m unittest discover -s tests -v

  web:
    name: JavaScript and web overlay
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: node tools/check_js_syntax.js

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser overlay tests
        run: npm run test:web
