<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rocket League Stats Overlay</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="overlay" aria-label="Rocket League stats overlay">
      <section class="stats-safezone" id="statsSafezone" aria-label="Live stats" hidden>
        <div class="stats-hud" id="statsHud" aria-label="Session stats">
          <span class="feed-status" id="feedStatus" hidden></span>
          <section class="menu-strip" aria-label="Menu stats strip">
            <div class="strip-stat" title="Session win rate">
              <img class="stat-icon" src="/media/icons/stats/MVP.webp" alt="">
              <strong class="stat-value" data-value="sessionWinRate">0.00</strong>
            </div>
            <div class="strip-stat" title="Session wins">
              <img class="stat-icon" src="/media/icons/stats/Win.webp" alt="">
              <strong class="stat-value" data-value="sessionWins">0</strong>
            </div>
            <div class="strip-stat" title="Session losses">
              <img class="stat-icon" src="/media/icons/stats/Lose.webp" alt="">
              <strong class="stat-value" data-value="sessionLosses">0</strong>
            </div>
            <div class="strip-stat" title="Current session streak">
              <img class="stat-icon" src="/media/icons/stats/streak.webp" alt="">
              <strong class="stat-value" data-value="sessionStreak">0</strong>
            </div>
            <div class="strip-stat strip-stat-text" title="Session win/loss ratio">
              <span class="stat-glyph" aria-hidden="true">WL</span>
              <strong class="stat-value" data-value="sessionWinLossRatio">0.0</strong>
            </div>
            <div class="strip-stat" title="Session demolitions">
              <img class="stat-icon" src="/media/icons/stats/Demolition.webp" alt="">
              <strong class="stat-value" data-value="sessionDemos">0</strong>
            </div>
            <div class="strip-stat" title="Session high fives">
              <img class="stat-icon" src="/media/icons/stats/High_Five.webp" alt="">
              <strong class="stat-value" data-value="sessionHighFives">0</strong>
            </div>
            <div class="strip-stat" title="Session low fives">
              <img class="stat-icon" src="/media/icons/stats/Low_Five.webp" alt="">
              <strong class="stat-value" data-value="sessionLowFives">0</strong>
            </div>
          </section>

          <section class="match-panel" aria-label="In-match stats">
            <div class="match-summary" aria-label="Session record">
              <div class="summary-stat" title="Session wins">
                <img class="stat-icon" src="/media/icons/stats/Win.webp" alt="">
                <strong data-value="sessionWins">0</strong>
              </div>
              <div class="summary-stat" title="Session losses">
                <img class="stat-icon" src="/media/icons/stats/Lose.webp" alt="">
                <strong data-value="sessionLosses">0</strong>
              </div>
              <div class="summary-stat" title="Current session streak">
                <img class="stat-icon" src="/media/icons/stats/streak.webp" alt="">
                <strong data-value="sessionStreak">0</strong>
              </div>
              <div class="summary-stat summary-stat-text" title="Session win/loss ratio">
                <span aria-hidden="true">WL</span>
                <strong data-value="sessionWinLossRatio">0.0</strong>
              </div>
            </div>

            <div class="stats-grid" aria-label="Match, session, and average stats">
              <div class="grid-heading stat-heading"></div>
              <div class="grid-heading">Match</div>
              <div class="grid-heading">Session</div>
              <div class="grid-heading">Avg</div>

              <img class="row-icon" src="/media/icons/stats/Goal.webp" alt="" title="Goals">
              <strong data-value="matchGoals">0</strong>
              <strong data-value="sessionGoals">0</strong>
              <strong data-value="avgGoals">0</strong>

              <img class="row-icon" src="/media/icons/stats/Assist.webp" alt="" title="Assists">
              <strong data-value="matchAssists">0</strong>
              <strong data-value="sessionAssists">0</strong>
              <strong data-value="avgAssists">0</strong>

              <img class="row-icon" src="/media/icons/stats/Save.webp" alt="" title="Saves">
              <strong data-value="matchSaves">0</strong>
              <strong data-value="sessionSaves">0</strong>
              <strong data-value="avgSaves">0</strong>

              <img class="row-icon" src="/media/icons/stats/Shot_on_Goal.webp" alt="" title="Shots">
              <strong data-value="matchShots">0</strong>
              <strong data-value="sessionShots">0</strong>
              <strong data-value="avgShots">0</strong>

              <img class="row-icon" src="/media/icons/stats/Demolition.webp" alt="" title="Demolitions">
              <strong data-value="matchDemos">0</strong>
              <strong data-value="sessionDemos">0</strong>
              <strong data-value="avgDemos">0</strong>

              <img class="row-icon" src="/media/icons/stats/High_Five.webp" alt="" title="High fives">
              <strong data-value="matchHighFives">0</strong>
              <strong data-value="sessionHighFives">0</strong>
              <strong data-value="avgHighFives">0</strong>

              <img class="row-icon" src="/media/icons/stats/Low_Five.webp" alt="" title="Low fives">
              <strong data-value="matchLowFives">0</strong>
              <strong data-value="sessionLowFives">0</strong>
              <strong data-value="avgLowFives">0</strong>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script src="/overlay.js"></script>
  </body>
</html>
