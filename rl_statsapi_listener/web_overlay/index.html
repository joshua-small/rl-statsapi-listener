<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rocket League Stats Overlay</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="overlay" aria-label="Rocket League stats overlay">
      <section class="stats-safezone" id="statsSafezone" aria-label="Live stats">
        <div class="stats-hud">
          <div class="session-strip" aria-label="Session record">
            <div class="metric-tile">
              <span>Wins</span>
              <strong id="sessionWins">0</strong>
            </div>
            <div class="metric-tile">
              <span>Losses</span>
              <strong id="sessionLosses">0</strong>
            </div>
            <div class="metric-tile">
              <span>Streak</span>
              <strong id="sessionStreak">0</strong>
            </div>
          </div>

          <div class="stat-columns">
            <section class="stat-panel" aria-label="Touch stats">
              <header>
                <h2>Touch</h2>
                <span>Session / Career</span>
              </header>
              <div class="stat-lines">
                <div class="split-line">
                  <span>Low fives</span>
                  <strong id="sessionLowFives">0</strong>
                  <em id="careerLowFives">0</em>
                </div>
                <div class="split-line">
                  <span>High fives</span>
                  <strong id="sessionHighFives">0</strong>
                  <em id="careerHighFives">0</em>
                </div>
                <div class="split-line">
                  <span>Demos</span>
                  <strong id="sessionDemos">0</strong>
                  <em id="careerDemos">0</em>
                </div>
              </div>
            </section>

            <section class="stat-panel" aria-label="Freeplay stats">
              <header>
                <h2>Freeplay</h2>
                <span>Shots</span>
              </header>
              <div class="stat-lines">
                <div class="value-line">
                  <span>Last</span>
                  <strong id="freeplayLast">-- kph</strong>
                </div>
                <div class="value-line">
                  <span>Session</span>
                  <strong id="freeplayBest">-- kph</strong>
                </div>
                <div class="value-line">
                  <span>All time</span>
                  <strong id="freeplayAllTime">-- kph</strong>
                </div>
              </div>
            </section>
          </div>

          <section class="stat-panel context-panel" aria-label="Club and playlist stats">
            <div class="context-row">
              <span>Club</span>
              <strong id="clubName"></strong>
            </div>
            <div class="context-row">
              <span>Record</span>
              <strong id="clubRecord"></strong>
            </div>
            <div class="context-row">
              <span>MMR</span>
              <strong id="recentMmr">MMR pending</strong>
            </div>
          </section>

          <section class="stat-panel dejavu-panel" aria-label="Deja-Vu stats">
            <header>
              <h2>Deja-Vu</h2>
              <span id="feedStatus" hidden></span>
            </header>
            <div class="dejavu-list" id="dejavuList"></div>
          </section>
        </div>
      </section>
    </main>
    <script src="/overlay.js"></script>
  </body>
</html>
